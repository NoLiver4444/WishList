server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ===== СТАТИЧЕСКИЕ ФАЙЛЫ =====
    # Кэшируем JS, CSS и другие статические файлы надолго
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== API ПРОКСИРОВАНИЕ =====
    # Все запросы на /api идут в backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        
        # Заголовки для корректной работы WebSocket и обычных запросов
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cache_bypass $http_upgrade;
    }

    # ===== REACT SPA МАРШРУТИЗАЦИЯ =====
    location / {
        # Пробуем найти реальный файл
        try_files $uri $uri/ /index.html;
        
        # Запрещаем кэшировать index.html (чтобы всегда была актуальная версия)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ===== БЕЗОПАСНОСТЬ =====
    # Запрещаем доступ к скрытым файлам и папкам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Запрещаем доступ к системным файлам
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== GZIP СЖАТИЕ =====
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    gzip_min_length 1024;
    gzip_comp_level 6;
}
